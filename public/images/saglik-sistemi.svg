  <!-- köşe yaprak -->
  <g transform="translate(486 300) scale(0.45)" fill="#c1121f" opacity="0.16">
    <polygon points="100,10 112,40 150,30 135,62 170,70 150,92 192,108 150,112 165,150 128,130 120,175 100,160 80,175 72,130 35,150 50,112 8,108 50,92 30,70 65,62 50,30 88,40"/>
